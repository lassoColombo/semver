name: tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: '0.113.1'

      - name: Install nutest
        run: git clone --depth 1 --branch v1.1.0 https://github.com/vyadh/nutest.git nutest

      - name: Run tests
        shell: nu {0}
        run: |
          use ./nutest/nutest
          nutest run-tests --path tests --fail --report { type: 'junit', path: 'report.xml' }

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: report.xml
